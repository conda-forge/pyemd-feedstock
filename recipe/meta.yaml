{% set name = "pyemd" %}
{% set version = "1.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 81f5fe15cf6a0a410a18c448c0d3f19d0b5daa0f71c901bc403a01eb5f6000e7

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vvv
  skip: true  # [win32]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - python
    - cython
    - pip
    - numpy
    - packaging
  run:
    - python
    - {{ pin_compatible('numpy') }}
    - setuptools

test:
  requires:
    - pytest

  source_files:
    - test/

  commands:
    - pytest -v test/

about:
  home: http://github.com/wmayner/pyemd
  license: MIT
  license_file: LICENSE
  summary: A Python wrapper for the Earth Mover's Distance.
  description: |
    PyEMD is a Python wrapper for Ofir Pele and Michael Werman’s implementation
    of the Earth Mover’s Distance that allows it to be used with NumPy.
  doc_url: http://github.com/wmayner/pyemd
  dev_url: http://github.com/wmayner/pyemd

extra:
  recipe-maintainers:
    - rmax
